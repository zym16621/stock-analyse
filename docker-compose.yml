version: '3.8'

services:
  stock-analyse:
    image: ${DOCKER_REGISTRY:-registry.cn-shenzhen.aliyuncs.com/your-namespace}/${PROJECT_NAME:-stock-analyse}:${IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: stock-analyse
    restart: always
    stop_grace_period: 60s
    shm_size: '512m'
    deploy:
      resources:
        limits:
          memory: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    command: >
      gunicorn app.main:app
      -w 2
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8168
      --timeout 120
      --graceful-timeout 60
      --keep-alive 60
      --access-logfile -
      --error-logfile -
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./logs:/app/logs
    env_file:
      - .env
    ports:
      - "127.0.0.1:8168:8168"   # 仅本机访问，避免公网暴露 dispatch 接口
    networks:
      - stock-net

  wechat-bot:
    build:
      context: ./wechat-bot
    container_name: wechat-bot
    restart: always
    depends_on:
      - stock-analyse
    environment:
      STOCK_ANALYSE_URL: http://stock-analyse:8168
      DISPATCH_TOKEN: ${WECHAT_DISPATCH_TOKEN}
      TZ: Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./wechat-bot/data:/root/.openclaw   # 登录态持久化
    stdin_open: true   # 首次扫码登录需要交互
    tty: true
    networks:
      - stock-net

networks:
  stock-net:
    driver: bridge
